
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#7bc47f;min-height:100vh;overflow-x:hidden;}
.world{min-height:100vh;background:linear-gradient(180deg,#b8e8f5 0%,#d4f0fa 35%,#c8ebb0 55%,#7bc47f 65%,#5aab5e 100%);position:relative;}
.screen{display:none;min-height:100vh;position:relative;z-index:1;flex-direction:column;align-items:center;}
.screen.active{display:flex;}
#startScreen{justify-content:center;padding:32px 20px;}
.acnh-board{background:#f5e6c8;border:4px solid #c8a96e;border-radius:20px;padding:28px 36px 24px;text-align:center;box-shadow:0 6px 0 #a07840,0 8px 24px rgba(0,0,0,.18);max-width:340px;width:100%;margin-bottom:20px;}
.acnh-icon{font-size:60px;display:block;margin-bottom:8px;animation:sway 3s ease-in-out infinite;}
@keyframes sway{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}
.acnh-title{font-family:'Press Start 2P',monospace;font-size:18px;color:#4a7c3f;text-shadow:2px 2px 0 #b8dba0;line-height:1.6;margin-bottom:6px;}
.acnh-sub{font-size:14px;font-weight:700;color:#7a5c2e;}
.main-btn{display:block;width:100%;max-width:240px;margin:0 auto 10px;padding:13px 0;border-radius:50px;font-family:'Press Start 2P',monospace;font-size:10px;cursor:pointer;transition:all .12s;letter-spacing:1px;}
.btn-green{background:#5aab5e;color:#fff;border:3px solid #3d8040;box-shadow:0 4px 0 #2c6030;}
.btn-tan{background:#f5e6c8;color:#7a5c2e;border:3px solid #c8a96e;box-shadow:0 3px 0 #a07840;}
.main-btn:hover{transform:translateY(-2px);}
.main-btn:active{transform:translateY(2px);}
.stat-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;justify-content:center;}
.stat-chip{background:rgba(255,255,255,.75);border:2px solid #c8dba8;border-radius:50px;padding:5px 13px;font-size:12px;font-weight:800;color:#4a6630;}
.screen-hdr{display:flex;align-items:center;gap:12px;width:100%;max-width:680px;margin-bottom:16px;background:#f5e6c8;border:3px solid #c8a96e;border-radius:16px;padding:10px 16px;box-shadow:0 3px 0 #a07840;}
.hdr-title{font-family:'Press Start 2P',monospace;font-size:11px;color:#4a7c3f;flex:1;}
.hdr-back{background:none;border:none;cursor:pointer;font-size:20px;line-height:1;}
#wordListScreen{padding:16px;justify-content:flex-start;align-items:center;}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:9px;width:100%;max-width:680px;}
.word-tile{background:#fffdf5;border:3px solid #c8a96e;border-radius:14px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s;box-shadow:0 3px 0 #a07840;}
.word-tile:hover{transform:translateY(-3px);box-shadow:0 6px 0 #a07840;}
.word-tile:active{transform:translateY(2px);box-shadow:0 1px 0 #a07840;}
.tile-plant{font-size:24px;display:block;margin-bottom:3px;}
.tile-word{font-family:'Press Start 2P',monospace;font-size:6.5px;color:#3a2a10;display:block;margin-bottom:2px;}
.tile-meaning{font-size:11px;font-weight:800;color:#7a5c2e;display:block;}
.stage-bar{display:flex;gap:2px;justify-content:center;margin-top:4px;}
.stage-dot{width:7px;height:7px;border-radius:50%;background:#e0cfa0;border:1.5px solid #c8a96e;}
.stage-dot.done{background:#5aab5e;border-color:#3d8040;}
.stage-dot.cur{background:#e07840;border-color:#a05020;}
#gardenScreen{padding:16px;justify-content:flex-start;align-items:center;}
.garden-scene{width:100%;max-width:680px;background:linear-gradient(180deg,#b8e8f5 0%,#d4f0fa 30%,#c8ebb0 52%,#7bc47f 65%,#5aab5e 100%);border:4px solid #4a8a4e;border-radius:24px;padding:20px 20px 36px;position:relative;overflow:hidden;min-height:340px;box-shadow:0 6px 0 #3a6a3e,0 8px 20px rgba(0,0,0,.15);}
.scene-sun{position:absolute;top:14px;right:24px;width:48px;height:48px;background:#ffe866;border-radius:50%;border:3px solid #e8c820;box-shadow:0 0 0 6px rgba(255,232,102,.3);}
.scene-cloud{position:absolute;background:#fff;border-radius:30px;animation:cloudDrift ease-in-out infinite;}
.scene-cloud::before{content:'';position:absolute;background:#fff;border-radius:50%;}
.sc1{top:16px;left:24px;width:68px;height:22px;animation-duration:7s;}
.sc1::before{top:-11px;left:14px;width:36px;height:26px;}
.sc2{top:10px;left:140px;width:44px;height:16px;opacity:.7;animation-duration:10s;animation-direction:reverse;}
.sc2::before{top:-8px;left:9px;width:26px;height:20px;}
@keyframes cloudDrift{0%,100%{transform:translateX(0);}50%{transform:translateX(14px);}}
.scene-grass{position:absolute;bottom:0;left:0;right:0;height:60px;background:#5aab5e;border-radius:0 0 18px 18px;}
.scene-grass::before{content:'';position:absolute;top:-10px;left:0;right:0;height:20px;background:#6ab86e;border-radius:50% 50% 0 0/20px 20px 0 0;}
.garden-plots{display:grid;grid-template-columns:repeat(8,1fr);gap:7px;position:relative;z-index:2;padding-bottom:36px;}
.gplot{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:42px;background:rgba(139,94,60,.2);border:2px solid rgba(100,60,20,.25);}
.gplot.planted{cursor:pointer;transition:transform .15s;}
.gplot.planted:hover{transform:scale(1.1) translateY(-4px);z-index:5;}
.gplot.s1{background:rgba(210,180,110,.5);border-color:#b89040;}
.gplot.s2{background:rgba(160,220,140,.5);border-color:#5aab5e;}
.gplot.s3{background:rgba(255,200,120,.5);border-color:#e07840;}
.gplot.s4{background:rgba(180,230,200,.5);border-color:#3aaa80;}
.gplot-icon{font-size:20px;line-height:1;}
.gplot-word{font-size:5.5px;font-weight:900;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.6);text-align:center;margin-top:1px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px;}
.gstats{display:flex;gap:10px;width:100%;max-width:680px;margin-top:12px;flex-wrap:wrap;}
.gstat{flex:1;min-width:90px;background:#fffdf5;border:3px solid #c8a96e;border-radius:14px;padding:10px 12px;text-align:center;box-shadow:0 3px 0 #a07840;}
.gstat-n{font-size:24px;font-weight:900;color:#3a2a10;}
.gstat-l{font-size:9px;font-weight:800;color:#7a5c2e;text-transform:uppercase;letter-spacing:.8px;}
#studyModal{display:none;position:fixed;inset:0;z-index:50;background:rgba(60,40,10,.55);align-items:center;justify-content:center;padding:20px;}
#studyModal.open{display:flex;}
.modal-box{background:#fffdf5;border:4px solid #c8a96e;border-radius:24px;padding:24px;width:100%;max-width:400px;box-shadow:0 8px 0 #a07840,0 12px 32px rgba(0,0,0,.2);position:relative;max-height:90vh;overflow-y:auto;}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;cursor:pointer;font-size:20px;color:#7a5c2e;}
.step-bar{display:flex;gap:4px;margin-bottom:20px;}
.step-item{flex:1;text-align:center;}
.step-icon{font-size:16px;display:block;}
.step-lbl{font-family:'Press Start 2P',monospace;font-size:7px;color:#c8a96e;margin-top:2px;}
.step-line{height:4px;background:#e0cfa0;border-radius:2px;margin-top:3px;}
.step-item.active .step-line{background:#e07840;}
.step-item.active .step-lbl{color:#e07840;}
.step-item.done .step-line{background:#5aab5e;}
.step-item.done .step-lbl{color:#5aab5e;}
.study-content{text-align:center;}
.study-mode-tag{display:inline-block;padding:3px 12px;border-radius:50px;font-size:11px;font-weight:800;letter-spacing:.5px;margin-bottom:12px;}
.tag-1{background:#d4f0c8;color:#2c6030;border:2px solid #8cc87a;}
.tag-2{background:#fde8b8;color:#7a4a10;border:2px solid #e0a040;}
.tag-3{background:#ddeeff;color:#2a4e7a;border:2px solid #6aa0d0;}
.tag-4{background:#fde0f8;color:#7a2a6a;border:2px solid #d080c0;}
.study-word{font-family:'Press Start 2P',monospace;font-size:24px;color:#3a2a10;margin-bottom:6px;line-height:1.4;}
.study-meaning{font-size:20px;font-weight:900;color:#7a5c2e;margin-bottom:10px;}
.study-sentence{background:#f0ead8;border:2px solid #d4c090;border-radius:12px;padding:12px 14px;font-size:13px;font-weight:700;color:#3a2a10;line-height:1.9;text-align:left;margin-bottom:6px;}
.study-sentence-ko{font-size:11px;color:#7a6040;font-weight:700;text-align:left;margin-top:4px;}
.study-input{width:100%;padding:12px 16px;border:3px solid #c8a96e;border-radius:14px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:700;background:#fffdf5;color:#3a2a10;outline:none;margin-top:12px;margin-bottom:8px;}
.study-input:focus{border-color:#5aab5e;box-shadow:0 0 0 3px rgba(90,171,94,.18);}
.study-input.ok{border-color:#5aab5e;background:#eafae8;}
.study-input.no{border-color:#d95a3a;background:#fde0d8;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}
.study-btn-row{display:flex;gap:8px;margin-top:4px;}
.study-btn{flex:1;padding:11px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .12s;}
.sbtn-green{background:#5aab5e;color:#fff;border:3px solid #3d8040;box-shadow:0 3px 0 #2c6030;}
.sbtn-tan{background:#f5e6c8;color:#7a5c2e;border:2px solid #c8a96e;box-shadow:0 2px 0 #a07840;}
.sbtn-green:hover,.sbtn-tan:hover{transform:translateY(-2px);}
.study-feedback{font-size:13px;font-weight:800;padding:7px 14px;border-radius:50px;margin:6px 0;text-align:center;animation:popIn .25s;}
@keyframes popIn{0%{transform:scale(.8);opacity:0;}100%{transform:scale(1);opacity:1;}}
.fb-ok{background:#d4f0c8;color:#2c6030;border:2px solid #8cc87a;}
.fb-no{background:#fde0d8;color:#8c2a10;border:2px solid #e08878;}
.fb-hint{background:#fde8b8;color:#7a4a10;border:2px solid #e0a040;}
.fb-hide{display:none;}
.complete-box{text-align:center;padding:8px 0;}
.complete-plant{font-size:60px;display:block;margin-bottom:10px;animation:bounce 1s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.complete-title{font-family:'Press Start 2P',monospace;font-size:13px;color:#4a7c3f;margin-bottom:8px;}
.complete-desc{font-size:14px;font-weight:700;color:#7a5c2e;line-height:1.7;margin-bottom:16px;}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
.cpiece{position:absolute;top:-20px;font-size:16px;animation:cfall linear forwards;}
@keyframes cfall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>

<div class="world">
<div class="screen active" id="startScreen">

  </div>
</div>

<div class="screen" id="wordListScreen">

  </div>

</div>

<div class="screen" id="gardenScreen">

    <div class="gstat"><div class="gstat-n" id="gs3">0</div><div class="gstat-l">총 점수</div></div>
    <div class="gstat"><div class="gstat-n" id="gs4">0</div><div class="gstat-l">최고 연속</div></div>
  </div>
</div>

<div id="studyModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="step-bar" id="stepBar">
      <div class="step-item" id="step0"><span class="step-icon">🃏</span><div class="step-lbl">카드</div><div class="step-line"></div></div>
      <div class="step-item" id="step1"><span class="step-icon">✏️</span><div class="step-lbl">단어</div><div class="step-line"></div></div>
      <div class="step-item" id="step2"><span class="step-icon">📝</span><div class="step-lbl">빈칸</div><div class="step-line"></div></div>
      <div class="step-item" id="step3"><span class="step-icon">✍️</span><div class="step-lbl">문장</div><div class="step-line"></div></div>
    </div>
    <div id="studyContent"></div>
  </div>
</div>
<div class="confetti-wrap" id="confettiWrap"></div>
</div>

const STAGE_PLANTS=['🌱','🌿','🌸','🌳'];
let state={score:0,bestStreak:0,streak:0,words:{}};
let modal={word:null,step:0,hintUsed:false};

function load(){try{const d=localStorage.getItem('pg5');if(d)state=JSON.parse(d);}catch(e){}}
function save(){localStorage.setItem('pg5',JSON.stringify(state));}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='startScreen')renderStart();
  if(id==='wordListScreen')renderWordList();
  if(id==='gardenScreen')renderGarden();
}

function renderStart(){
  document.getElementById('stPlanted').textContent=Object.keys(state.words).length;
  document.getElementById('stScore').textContent=state.score;
  document.getElementById('stStreak').textContent=state.bestStreak;
}

function getPlant(stage){
  if(stage===0)return '🟫';
  return STAGE_PLANTS[Math.min(stage-1,3)];
}

function renderWordList(){
  const grid=document.getElementById('wordGrid');
  grid.innerHTML='';
  let learned=0;
  WORDS.forEach(wd=>{
    const data=state.words[wd.w]||{stage:0};
    if(data.stage>=4)learned++;
    const tile=document.createElement('div');
    tile.className='word-tile';
    let dots='';
    for(let i=0;i<4;i++){
      const cls=i<data.stage?'done':i===data.stage&&data.stage<4?'cur':'';
      dots+=`<div class="stage-dot ${cls}"></div>`;
    }
    tile.innerHTML=`
      <span class="tile-plant">${data.stage===0?wd.e:getPlant(data.stage)}</span>
      <span class="tile-word">${wd.w}</span>
      <span class="tile-meaning">${wd.m}</span>
      <div class="stage-bar">${dots}</div>`;
    tile.onclick=()=>openStudy(wd.w);
    grid.appendChild(tile);
  });
  document.getElementById('learnedCount').textContent=learned;
}

function renderGarden(){
  const plots=document.getElementById('gardenPlots');
  plots.innerHTML='';
  const planted=Object.entries(state.words);
  for(let i=0;i<120;i++){
    const el=document.createElement('div');
    el.className='gplot';
    if(i<planted.length){
      const[word,data]=planted[i];
      el.classList.add('planted','s'+Math.min(data.stage,4));
      el.innerHTML=`<div class="gplot-icon">${getPlant(data.stage)}</div><div class="gplot-word">${word}</div>`;
      el.onclick=()=>openStudy(word);
    }
    plots.appendChild(el);
  }
  const full=Object.values(state.words).filter(d=>d.stage>=4).length;
  document.getElementById('gs1').textContent=Object.keys(state.words).length;
  document.getElementById('gs2').textContent=full;
  document.getElementById('gs3').textContent=state.score;
  document.getElementById('gs4').textContent=state.bestStreak;
}

function openStudy(word){
  const data=state.words[word]||{stage:0};
  modal.word=word;
  modal.step=data.stage>=4?0:data.stage;
  modal.hintUsed=false;
  document.getElementById('studyModal').classList.add('open');
  renderStudyStep();
}

function closeModal(){
  document.getElementById('studyModal').classList.remove('open');
  const active=document.querySelector('.screen.active');
  if(active&&active.id==='wordListScreen')renderWordList();
  if(active&&active.id==='gardenScreen')renderGarden();
}

function updateStepBar(){
  for(let i=0;i<4;i++){
    const el=document.getElementById('step'+i);
    el.className='step-item';
    if(i<modal.step)el.classList.add('done');
    else if(i===modal.step)el.classList.add('active');
  }
}

function renderStudyStep(){
  modal.hintUsed=false;
  updateStepBar();
  const word=modal.word;
  const step=modal.step;
  const wData=WORDS.find(x=>x.w===word);
  const sd=S[word];
  const content=document.getElementById('studyContent');

  if(step===0){
    content.innerHTML=`
      <div class="study-content">
        <span class="study-mode-tag tag-1">🃏 플래시카드</span>
        <div style="font-size:52px;margin-bottom:8px;">${wData.e}</div>
        <div class="study-word">${word}</div>
        <div class="study-meaning">${wData.m}</div>
        ${sd?`<div class="study-sentence">${sd.s.replace('___',`<strong style="color:#4a7c3f;">${word}</strong>`)}<div class="study-sentence-ko">${sd.t}</div></div>`:''}
        <div class="study-btn-row" style="margin-top:14px;">
          <button class="study-btn sbtn-green" onclick="advanceStep()">외웠어요! →</button>
        </div>
      </div>`;
  } else if(step===1){
    content.innerHTML=`
      <div class="study-content">
        <span class="study-mode-tag tag-2">✏️ 단어 맞추기</span>
        <div style="font-size:48px;margin-bottom:8px;">${wData.e}</div>
        <div class="study-meaning">${wData.m}</div>
        <div style="font-size:13px;color:#7a5c2e;font-weight:700;margin-bottom:4px;">영어 단어를 입력하세요</div>
        <div class="study-feedback fb-hide" id="sf"></div>
        <input class="study-input" id="si" placeholder="영어 단어..." autocomplete="off" autocorrect="off" spellcheck="false">
        <div class="study-btn-row">
          <button class="study-btn sbtn-tan" onclick="showStudyHint()">💡 힌트</button>
          <button class="study-btn sbtn-green" onclick="checkStudy()">확인 ✓</button>
        </div>
      </div>`;
    document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')checkStudy();});
  } else if(step===2){
    const sentDisplay=sd?sd.s.replace('___','<span style="background:#c8a96e;color:#fff;padding:0 8px;border-radius:5px;font-weight:800;">___</span>'):'';
    content.innerHTML=`
      <div class="study-content">
        <span class="study-mode-tag tag-3">📝 빈칸 채우기</span>
        <div style="font-size:40px;margin-bottom:8px;">${wData.e}</div>
        <div class="study-sentence">${sentDisplay}<div class="study-sentence-ko">${sd?sd.t:''}</div></div>
        <div class="study-feedback fb-hide" id="sf"></div>
        <input class="study-input" id="si" placeholder="빈칸에 들어갈 단어..." autocomplete="off" autocorrect="off" spellcheck="false">
        <div class="study-btn-row">
          <button class="study-btn sbtn-tan" onclick="showStudyHint()">💡 힌트</button>
          <button class="study-btn sbtn-green" onclick="checkStudy()">확인 ✓</button>
        </div>
      </div>`;
    document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')checkStudy();});
  } else if(step===3){
    content.innerHTML=`
      <div class="study-content">
        <span class="study-mode-tag tag-4">✍️ 문장 쓰기</span>
        <div style="font-size:40px;margin-bottom:8px;">${wData.e}</div>
        <div class="study-meaning">${wData.m}</div>
        ${sd?`<div class="study-sentence-ko" style="font-size:13px;margin-bottom:10px;">${sd.t}</div>`:''}
        <div style="font-size:12px;color:#7a5c2e;font-weight:700;margin-bottom:6px;">영어 단어를 다시 한 번 써보세요!</div>
        <div class="study-feedback fb-hide" id="sf"></div>
        <input class="study-input" id="si" placeholder="영어 단어..." autocomplete="off" autocorrect="off" spellcheck="false">
        <div class="study-btn-row">
          <button class="study-btn sbtn-tan" onclick="showStudyHint()">💡 힌트</button>
          <button class="study-btn sbtn-green" onclick="checkStudy()">확인 ✓</button>
        </div>
      </div>`;
    document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')checkStudy();});
  } else {
    showComplete();
  }
}

function showStudyHint(){
  modal.hintUsed=true;
  const w=modal.word;
  const hint=w[0]+w.slice(1).split('').map((c,i)=>i<2?c:'_').join('');
  const fb=document.getElementById('sf');
  if(fb){fb.textContent='힌트: '+hint;fb.className='study-feedback fb-hint';}
}

function checkStudy(){
  const inp=document.getElementById('si');
  const fb=document.getElementById('sf');
  if(!inp)return;
  const val=inp.value.trim().toLowerCase();
  if(!val)return;
  if(val===modal.word){
    inp.className='study-input ok';
    fb.textContent='정답! 🌿';fb.className='study-feedback fb-ok';
    state.score+=modal.hintUsed?5:10;
    state.streak++;
    if(state.streak>state.bestStreak)state.bestStreak=state.streak;
    save();
    setTimeout(()=>advanceStep(),700);
  } else {
    inp.className='study-input no';
    fb.textContent='틀렸어요! 정답: '+modal.word;fb.className='study-feedback fb-no';
    state.streak=0;save();
    setTimeout(()=>{inp.className='study-input';inp.value='';},1000);
  }
}

function advanceStep(){
  const word=modal.word;
  if(!state.words[word])state.words[word]={stage:0};
  const data=state.words[word];
  if(modal.step>=data.stage&&data.stage<4){
    data.stage++;
    data.plant=STAGE_PLANTS[Math.min(data.stage-1,3)];
  }
  modal.step++;
  save();
  if(modal.step>=4)showComplete();
  else renderStudyStep();
}

function showComplete(){
  updateStepBar();
  const word=modal.word;
  const data=state.words[word]||{stage:4};
  const wData=WORDS.find(x=>x.w===word);
  document.getElementById('studyContent').innerHTML=`
    <div class="complete-box">
      <span class="complete-plant">${getPlant(data.stage)}</span>
      <div class="complete-title">${data.stage>=4?'완전 성장!':'복습 완료!'}</div>
      <div class="complete-desc">${word} (${wData?wData.m:''})<br>${data.stage>=4?'정원에 나무가 자랐어요! 🌳':'단어를 다시 익혔어요!'}</div>
      <div class="study-btn-row">
        <button class="study-btn sbtn-tan" onclick="closeModal()">정원으로</button>
        <button class="study-btn sbtn-green" onclick="closeModal();showScreen('wordListScreen')">다른 단어</button>
      </div>
    </div>`;
  if(data.stage>=4)spawnConfetti(14);
}

function spawnConfetti(n){
  const wrap=document.getElementById('confettiWrap');
  const pieces=['🌸','🍀','⭐','🌼','🌿','🎊','🍃'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');
    el.className='cpiece';
    el.textContent=pieces[Math.floor(Math.random()*pieces.length)];
    el.style.left=(10+Math.random()*80)+'%';
    el.style.animationDuration=(1.5+Math.random()*2)+'s';
    el.style.animationDelay=(Math.random()*.5)+'s';
    wrap.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  }
}

load();showScreen('startScreen');
</script>
