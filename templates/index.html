<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>픽셀 정원 🌱</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700&display=swap');

  :root {
    --sky: #87CEEB;
    --sky-dark: #5a9abf;
    --ground: #8B5E3C;
    --grass: #4CAF50;
    --grass-dark: #388E3C;
    --soil: #6D4C41;
    --panel-bg: #FFF8E7;
    --panel-border: #D4A853;
    --pixel: 4px;
    --correct: #4CAF50;
    --wrong: #E53935;
    --water: #29B6F6;
    --text-dark: #2D1B0E;
    --text-mid: #5C3D1E;
    --accent: #FF8F00;
    --wilted: #9E9E9E;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }

  body {
    background: var(--sky);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 로그인 화면 ─────────────────────────────────────── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(to bottom, #87CEEB 60%, #4CAF50 60%);
  }

  .login-box {
    background: var(--panel-bg);
    border: 4px solid var(--panel-border);
    box-shadow: 6px 6px 0 #8B5E3C;
    padding: 2rem 2.5rem;
    text-align: center;
    max-width: 380px;
    width: 90%;
  }

  .login-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--text-dark);
    line-height: 1.8;
    margin-bottom: 1.5rem;
  }

  .pixel-tree {
    font-size: 64px;
    display: block;
    margin-bottom: 1rem;
    line-height: 1;
  }

  input[type="text"] {
    width: 100%;
    padding: 0.7rem 1rem;
    border: 3px solid var(--panel-border);
    background: #FFFDE7;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    outline: none;
    margin-bottom: 1rem;
  }

  input[type="text"]:focus { border-color: var(--accent); }

  .btn {
    display: inline-block;
    padding: 0.7rem 1.5rem;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    cursor: pointer;
    border: 3px solid;
    transition: transform 0.05s;
    user-select: none;
  }
  .btn:active { transform: translate(2px,2px); }
  .btn-primary { background: #FFD600; border-color: #F57F17; color: #3E2723; }
  .btn-green { background: #69F0AE; border-color: #1B5E20; color: #1B5E20; }
  .btn-blue { background: #40C4FF; border-color: #01579B; color: #01579B; }
  .btn-red { background: #FF8A80; border-color: #B71C1C; color: #B71C1C; }
  .btn-gray { background: #ECEFF1; border-color: #546E7A; color: #263238; }
  .btn-full { width: 100%; display: block; text-align: center; }
  .btn + .btn { margin-top: 0.5rem; }

  /* ── 메인 레이아웃 ───────────────────────────────────── */
  #main-screen { display: none; }

  .top-bar {
    background: #1B5E20;
    border-bottom: 4px solid #0A3D08;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .top-bar-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: #CCFF90;
  }

  .top-bar-score {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: #FFD600;
  }

  .nav-tabs {
    display: flex;
    background: #2E7D32;
    border-bottom: 4px solid #1B5E20;
  }

  .nav-tab {
    flex: 1;
    text-align: center;
    padding: 0.6rem;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #A5D6A7;
    cursor: pointer;
    border: none;
    background: transparent;
    transition: background 0.1s;
  }

  .nav-tab.active {
    background: var(--panel-bg);
    color: #1B5E20;
    border-bottom: 3px solid #FFD600;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── 정원 탭 ─────────────────────────────────────────── */
  #garden-tab {
    background: linear-gradient(to bottom, #87CEEB 45%, #4CAF50 45%, #4CAF50 55%, #8B5E3C 55%);
    min-height: 70vh;
    padding: 1rem;
    position: relative;
  }

  .garden-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 72px);
    gap: 8px;
    justify-content: center;
    padding-top: 2rem;
    padding-bottom: 1rem;
  }

  .plant-slot {
    width: 72px;
    text-align: center;
    cursor: pointer;
  }

  .plant-canvas {
    width: 64px;
    height: 64px;
    display: block;
    margin: 0 auto 2px;
    image-rendering: pixelated;
  }

  .plant-label {
    font-size: 9px;
    color: var(--text-dark);
    font-family: 'Press Start 2P', monospace;
    word-break: break-all;
    background: rgba(255,255,255,0.7);
    padding: 1px 2px;
  }

  /* ── 학습 탭 ─────────────────────────────────────────── */
  #learn-tab {
    padding: 1rem;
    min-height: 70vh;
    background: var(--panel-bg);
  }

  .stage-indicator {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .stage-dot {
    width: 16px; height: 16px;
    border: 2px solid #ccc;
    background: #eee;
    position: relative;
  }

  .stage-dot.done { background: #69F0AE; border-color: #1B5E20; }
  .stage-dot.active { background: #FFD600; border-color: #F57F17; }

  .learn-card {
    background: white;
    border: 3px solid var(--panel-border);
    box-shadow: 4px 4px 0 #D4A853;
    padding: 2rem 1.5rem;
    text-align: center;
    max-width: 480px;
    margin: 0 auto 1.5rem;
  }

  .word-display {
    font-family: 'Press Start 2P', monospace;
    font-size: 22px;
    color: #1B5E20;
    margin-bottom: 0.5rem;
    letter-spacing: 2px;
  }

  .meaning-display {
    font-size: 20px;
    color: var(--text-mid);
    font-weight: 700;
    margin-bottom: 1rem;
  }

  .hint-text {
    font-size: 12px;
    color: #888;
    margin-bottom: 1.5rem;
    font-family: 'Press Start 2P', monospace;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .option-btn {
    padding: 0.8rem;
    border: 3px solid #ccc;
    background: #FAFAFA;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    cursor: pointer;
    text-align: center;
    transition: all 0.1s;
  }

  .option-btn:hover { border-color: var(--accent); background: #FFFDE7; }
  .option-btn.correct { background: #E8F5E9; border-color: #1B5E20; color: #1B5E20; }
  .option-btn.wrong { background: #FFEBEE; border-color: #B71C1C; color: #B71C1C; }

  .fill-input {
    width: 100%;
    padding: 0.8rem;
    font-size: 18px;
    border: 3px solid #ccc;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
    letter-spacing: 3px;
    margin-bottom: 1rem;
  }

  .fill-input:focus { outline: none; border-color: var(--accent); }

  .sentence-display {
    font-size: 17px;
    color: var(--text-dark);
    margin-bottom: 0.5rem;
    line-height: 1.7;
  }

  .translation-display {
    font-size: 14px;
    color: #888;
    margin-bottom: 1.5rem;
  }

  textarea {
    width: 100%;
    min-height: 80px;
    padding: 0.8rem;
    font-size: 15px;
    border: 3px solid #ccc;
    font-family: 'Noto Sans KR', sans-serif;
    resize: vertical;
    margin-bottom: 1rem;
  }

  textarea:focus { outline: none; border-color: var(--accent); }

  .feedback-box {
    padding: 1rem;
    border: 3px solid;
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 1rem;
    display: none;
  }

  .feedback-box.correct { background: #E8F5E9; border-color: #1B5E20; color: #1B5E20; }
  .feedback-box.wrong { background: #FFEBEE; border-color: #B71C1C; color: #B71C1C; }

  /* ── 복습 탭 ─────────────────────────────────────────── */
  #review-tab {
    padding: 1rem;
    background: #FFF3E0;
    min-height: 70vh;
  }

  .review-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--text-dark);
    margin-bottom: 1rem;
    text-align: center;
  }

  .flashcard-container {
    perspective: 800px;
    max-width: 360px;
    margin: 0 auto 1.5rem;
    height: 200px;
  }

  .flashcard {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.4s;
    cursor: pointer;
  }

  .flashcard.flipped { transform: rotateY(180deg); }

  .flashcard-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 4px solid var(--panel-border);
    background: white;
    box-shadow: 5px 5px 0 #D4A853;
  }

  .flashcard-back { transform: rotateY(180deg); background: #FFFDE7; }

  .flashcard-word {
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    color: #1B5E20;
    margin-bottom: 0.5rem;
  }

  .flashcard-meaning {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-mid);
  }

  .flashcard-hint {
    font-size: 11px;
    color: #aaa;
    margin-top: 0.5rem;
  }

  .review-nav {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .review-counter {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--text-dark);
  }

  .wilted-list {
    max-width: 480px;
    margin: 0 auto;
  }

  .wilted-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    border: 2px solid #FFCC02;
    padding: 0.7rem 1rem;
    margin-bottom: 8px;
  }

  .wilted-emoji { font-size: 24px; }

  .wilted-word {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--text-dark);
  }

  .wilted-meaning {
    font-size: 13px;
    color: var(--text-mid);
    margin-top: 2px;
  }

  /* ── 랭킹 탭 ─────────────────────────────────────────── */
  #ranking-tab {
    padding: 1rem;
    background: #E8F5E9;
    min-height: 70vh;
  }

  .ranking-item {
    display: flex;
    align-items: center;
    background: white;
    border: 2px solid #A5D6A7;
    padding: 0.7rem 1rem;
    margin-bottom: 8px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  .rank-num {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    width: 36px;
    color: var(--accent);
  }

  .rank-name {
    font-size: 15px;
    font-weight: 700;
    flex: 1;
  }

  .rank-score {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #1B5E20;
  }

  /* ── 토스트 메시지 ───────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #212121;
    color: white;
    padding: 0.8rem 1.5rem;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    line-height: 1.6;
    max-width: 320px;
    text-align: center;
    transition: transform 0.3s;
    z-index: 1000;
    pointer-events: none;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── 식물 팝업 ───────────────────────────────────────── */
  #plant-popup {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  #plant-popup.show { display: flex; }

  .popup-box {
    background: var(--panel-bg);
    border: 4px solid var(--panel-border);
    box-shadow: 6px 6px 0 #8B5E3C;
    padding: 2rem;
    text-align: center;
    max-width: 300px;
    width: 90%;
  }

  .popup-word {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    color: #1B5E20;
    margin-bottom: 0.5rem;
  }

  .popup-meaning {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .popup-stage {
    font-size: 12px;
    color: #888;
    margin-bottom: 1rem;
  }

  .stage-bar {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .stage-pip {
    width: 20px; height: 12px;
    border: 2px solid #ccc;
    background: #eee;
  }

  .stage-pip.filled { background: #69F0AE; border-color: #1B5E20; }
  .stage-pip.wilted-pip { background: #EF9A9A; border-color: #B71C1C; }

  .loading { text-align: center; padding: 2rem; color: #888; font-size: 13px; }
</style>
</head>
<body>

<!-- ══ 로그인 화면 ══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <span class="pixel-tree">🌱</span>
    <div class="login-title">PIXEL<br>GARDEN</div>
    <p style="font-size:13px;color:#555;margin-bottom:1.2rem;">단어를 심고 정원을 키워봐!</p>
    <input type="text" id="nickname-input" placeholder="닉네임 입력 (1~10자)" maxlength="10">
    <button class="btn btn-primary btn-full" onclick="login()">시작하기 ▶</button>
  </div>
</div>

<!-- ══ 메인 화면 ════════════════════════════════════════════ -->
<div id="main-screen">
  <div class="top-bar">
    <span class="top-bar-name" id="top-name">플레이어</span>
    <span class="top-bar-score" id="top-score">⭐ 0</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('garden')">🌿 정원</button>
    <button class="nav-tab" onclick="switchTab('learn')">📖 학습</button>
    <button class="nav-tab" onclick="switchTab('review')">🔁 복습</button>
    <button class="nav-tab" onclick="switchTab('ranking')">🏆 랭킹</button>
  </div>

  <!-- 정원 탭 -->
  <div id="garden-tab" class="tab-content active">
    <div class="garden-grid" id="garden-grid">
      <div class="loading">정원을 불러오는 중...</div>
    </div>
  </div>

  <!-- 학습 탭 -->
  <div id="learn-tab" class="tab-content">
    <div class="stage-indicator" id="stage-indicator">
      <div class="stage-dot" id="dot-0" title="단어 보기"></div>
      <div class="stage-dot" id="dot-1" title="플래시카드"></div>
      <div class="stage-dot" id="dot-2" title="빈칸 채우기"></div>
      <div class="stage-dot" id="dot-3" title="문장 만들기"></div>
    </div>

    <!-- Stage 0: 단어 소개 -->
    <div id="stage-0" class="learn-stage">
      <div class="learn-card" id="intro-card">
        <div style="font-size:48px;margin-bottom:0.5rem;" id="intro-plant">🌰</div>
        <div class="word-display" id="intro-word">---</div>
        <div class="meaning-display" id="intro-meaning">---</div>
        <div class="hint-text" id="intro-status">새로운 씨앗을 심어요!</div>
      </div>
      <div style="text-align:center;">
        <button class="btn btn-green" onclick="goStage(1)">외웠어! 다음 ▶</button>
      </div>
    </div>

    <!-- Stage 1: 플래시카드 퀴즈 -->
    <div id="stage-1" class="learn-stage" style="display:none;">
      <div class="learn-card">
        <div style="font-size:13px;color:#888;margin-bottom:0.5rem;">한글 뜻을 보고 영단어를 골라봐!</div>
        <div class="meaning-display" id="fc-question">---</div>
        <div class="options-grid" id="fc-options"></div>
        <div class="feedback-box" id="fc-feedback"></div>
        <button class="btn btn-gray btn-full" id="fc-next" style="display:none;" onclick="goStage(2)">다음 단계 ▶</button>
      </div>
    </div>

    <!-- Stage 2: 빈칸 채우기 -->
    <div id="stage-2" class="learn-stage" style="display:none;">
      <div class="learn-card">
        <div style="font-size:13px;color:#888;margin-bottom:0.5rem;">빈칸에 단어를 채워봐!</div>
        <div class="sentence-display" id="fill-sentence">---</div>
        <div class="translation-display" id="fill-translation">---</div>
        <input class="fill-input" type="text" id="fill-answer" placeholder="정답 입력..." autocomplete="off">
        <div class="feedback-box" id="fill-feedback"></div>
        <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
          <button class="btn btn-green" onclick="submitFill()">제출 ✓</button>
          <button class="btn btn-gray" id="fill-next" style="display:none;" onclick="goStage(3)">다음 단계 ▶</button>
        </div>
      </div>
    </div>

    <!-- Stage 3: 문장 만들기 -->
    <div id="stage-3" class="learn-stage" style="display:none;">
      <div class="learn-card">
        <div style="font-size:13px;color:#888;margin-bottom:0.5rem;">이 단어로 짧은 영어 문장을 만들어봐!</div>
        <div class="word-display" id="write-word" style="font-size:16px;margin-bottom:0.3rem;">---</div>
        <div class="meaning-display" id="write-meaning" style="font-size:14px;margin-bottom:1rem;">---</div>
        <textarea id="write-answer" placeholder="여기에 영어 문장을 써봐..."></textarea>
        <div class="feedback-box" id="write-feedback"></div>
        <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
          <button class="btn btn-green" onclick="submitWrite()">제출 ✓</button>
          <button class="btn btn-primary" id="write-next" style="display:none;" onclick="startLearn()">새 단어 심기 🌱</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 복습 탭 -->
  <div id="review-tab" class="tab-content">
    <div class="review-title">🥀 시든 단어 복습</div>

    <!-- 플래시카드 영역 -->
    <div id="review-flashcard-area" style="display:none;">
      <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="review-card">
          <div class="flashcard-face">
            <div class="flashcard-word" id="rc-word">---</div>
            <div class="flashcard-hint">클릭해서 뒤집기</div>
          </div>
          <div class="flashcard-face flashcard-back">
            <div class="flashcard-meaning" id="rc-meaning">---</div>
            <div class="flashcard-hint">뜻 확인!</div>
          </div>
        </div>
      </div>
      <div class="review-nav">
        <button class="btn btn-gray" onclick="prevCard()">◀</button>
        <span class="review-counter" id="review-counter">0 / 0</span>
        <button class="btn btn-gray" onclick="nextCard()">▶</button>
      </div>
    </div>

    <!-- 시든 단어 목록 -->
    <div class="wilted-list" id="wilted-list">
      <div class="loading">시든 단어 불러오는 중...</div>
    </div>
  </div>

  <!-- 랭킹 탭 -->
  <div id="ranking-tab" class="tab-content">
    <div class="review-title" style="background:#E8F5E9;padding-top:1rem;">🏆 랭킹</div>
    <div id="ranking-list"><div class="loading">불러오는 중...</div></div>
  </div>
</div>

<!-- 식물 팝업 -->
<div id="plant-popup">
  <div class="popup-box">
    <div style="font-size:56px;margin-bottom:0.5rem;" id="popup-plant-emoji">🌱</div>
    <div class="popup-word" id="popup-word">---</div>
    <div class="popup-meaning" id="popup-meaning">---</div>
    <div class="popup-stage" id="popup-stage">단계: ---</div>
    <div class="stage-bar" id="popup-bar"></div>
    <button class="btn btn-gray" onclick="closePlantPopup()">닫기</button>
  </div>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<script>
// ── 픽셀아트 식물 이모지 ─────────────────────────────────
const PLANT_EMOJI = {
  seed:   '🌰',
  sprout: '🌱',
  leaf:   '🌿',
  flower: '🌸',
  fruit:  '🍎',
  wilted: '🥀',
};

const STAGE_NAMES = ['씨앗', '새싹', '잎', '꽃', '열매'];
const STAGE_EMOJIS = ['🌰','🌱','🌿','🌸','🍎'];

// ── 상태 ─────────────────────────────────────────────────
let currentUser = null;
let currentWord = null;
let currentStage = 0;
let currentFillAnswer = '';
let reviewWords = [];
let reviewIndex = 0;
let cardFlipped = false;

// ── 유틸 ─────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setDots(active) {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('dot-' + i);
    d.className = 'stage-dot' + (i < active ? ' done' : i === active ? ' active' : '');
  }
}

// ── API ───────────────────────────────────────────────────
async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  return res.json();
}

// ── 로그인 ────────────────────────────────────────────────
async function login() {
  const nick = document.getElementById('nickname-input').value.trim();
  if (!nick) { showToast('닉네임을 입력해줘!'); return; }
  const data = await api('/api/login', 'POST', { nickname: nick });
  if (data.error) { showToast(data.error); return; }
  currentUser = data.user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  updateTopBar();
  loadGarden();
  startLearn();
}

function updateTopBar() {
  document.getElementById('top-name').textContent = currentUser.nickname;
  document.getElementById('top-score').textContent = '⭐ ' + currentUser.score;
}

// ── 탭 전환 ───────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById(name + '-tab').classList.add('active');
  event.target.classList.add('active');

  if (name === 'garden') loadGarden();
  if (name === 'review') loadReview();
  if (name === 'ranking') loadRanking();
}

// ── 정원 ─────────────────────────────────────────────────
async function loadGarden() {
  const garden = await api('/api/garden');
  const grid = document.getElementById('garden-grid');
  if (!garden.length) {
    grid.innerHTML = '<div class="loading" style="grid-column:1/-1">아직 단어를 하나도 심지 않았어요!<br>학습 탭에서 첫 씨앗을 심어봐 🌰</div>';
    return;
  }
  grid.innerHTML = garden.map(p => {
    const emoji = p.wilted ? PLANT_EMOJI.wilted : STAGE_EMOJIS[p.stage];
    return `<div class="plant-slot" onclick='showPlantPopup(${JSON.stringify(p)})'>
      <canvas class="plant-canvas" id="pc-${p.word}" width="64" height="64"></canvas>
      <div class="plant-label">${p.word}</div>
    </div>`;
  }).join('');
  garden.forEach(p => drawPlant(p));
}

function drawPlant(p) {
  const canvas = document.getElementById('pc-' + p.word);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,64,64);
  const S = 4; // pixel size

  // 땅
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(0, 48, 64, 16);
  ctx.fillStyle = '#6D4C41';
  ctx.fillRect(0, 52, 64, 4);

  if (p.wilted) {
    drawPixelWilted(ctx, S);
    return;
  }

  switch(p.stage) {
    case 0: drawPixelSeed(ctx, S); break;
    case 1: drawPixelSprout(ctx, S); break;
    case 2: drawPixelLeaf(ctx, S); break;
    case 3: drawPixelFlower(ctx, S); break;
    case 4: drawPixelFruit(ctx, S); break;
  }
}

function px(ctx, x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x*4, y*4, w*4, h*4);
}

function drawPixelSeed(ctx, S) {
  px(ctx, 7,10,2,2,'#8B5E3C');
  px(ctx, 6,11,4,3,'#A1887F');
  px(ctx, 7,11,2,2,'#6D4C41');
}

function drawPixelSprout(ctx, S) {
  // 줄기
  px(ctx,7,6,2,6,'#558B2F');
  // 잎 왼쪽
  px(ctx,4,5,3,2,'#66BB6A');
  // 잎 오른쪽
  px(ctx,9,4,3,2,'#81C784');
  // 뿌리 힌트
  px(ctx,7,11,2,1,'#6D4C41');
}

function drawPixelLeaf(ctx, S) {
  // 줄기
  px(ctx,7,3,2,9,'#558B2F');
  // 큰 잎 왼
  px(ctx,3,5,4,3,'#4CAF50');
  px(ctx,2,6,2,2,'#66BB6A');
  // 큰 잎 오
  px(ctx,9,3,4,3,'#388E3C');
  px(ctx,12,4,2,2,'#4CAF50');
}

function drawPixelFlower(ctx, S) {
  // 줄기
  px(ctx,7,4,2,8,'#558B2F');
  // 잎들
  px(ctx,3,7,4,2,'#4CAF50');
  px(ctx,9,6,4,2,'#388E3C');
  // 꽃잎
  px(ctx,6,0,4,2,'#F48FB1');
  px(ctx,6,4,4,2,'#F48FB1');
  px(ctx,4,2,2,3,'#F48FB1');
  px(ctx,10,2,2,3,'#F48FB1');
  // 꽃 중심
  px(ctx,6,1,4,3,'#FFD54F');
  px(ctx,7,0,2,4,'#FFD54F');
}

function drawPixelFruit(ctx, S) {
  // 줄기
  px(ctx,7,5,2,7,'#558B2F');
  // 잎들
  px(ctx,3,7,4,2,'#4CAF50');
  px(ctx,9,6,4,2,'#388E3C');
  // 열매 (빨간 사과 느낌)
  px(ctx,5,0,6,1,'#66BB6A');
  px(ctx,4,1,8,5,'#E53935');
  px(ctx,3,2,9,4,'#EF5350');
  px(ctx,5,1,6,5,'#E53935');
  // 하이라이트
  px(ctx,6,2,2,2,'#EF9A9A');
  // 꼭지
  px(ctx,7,0,2,1,'#558B2F');
}

function drawPixelWilted(ctx, S) {
  // 줄기 (회색)
  px(ctx,7,5,2,7,'#9E9E9E');
  // 시든 잎들
  px(ctx,3,8,4,2,'#78909C');
  px(ctx,9,7,4,2,'#78909C');
  // 시든 꽃
  px(ctx,5,2,6,2,'#B0BEC5');
  px(ctx,6,1,4,4,'#90A4AE');
}

// ── 식물 팝업 ─────────────────────────────────────────────
function showPlantPopup(p) {
  const emoji = p.wilted ? PLANT_EMOJI.wilted : STAGE_EMOJIS[p.stage];
  document.getElementById('popup-plant-emoji').textContent = emoji;
  document.getElementById('popup-word').textContent = p.word;
  document.getElementById('popup-meaning').textContent = p.meaning;
  document.getElementById('popup-stage').textContent = p.wilted ? '🥀 시들었어요 - 복습이 필요해!' : `${STAGE_NAMES[p.stage]} 단계 (${p.stage}/4)`;

  const bar = document.getElementById('popup-bar');
  bar.innerHTML = Array.from({length:4}, (_,i) => {
    let cls = 'stage-pip';
    if (p.wilted) cls += ' wilted-pip';
    else if (i < p.stage) cls += ' filled';
    return `<div class="${cls}"></div>`;
  }).join('');

  document.getElementById('plant-popup').classList.add('show');
}

function closePlantPopup() {
  document.getElementById('plant-popup').classList.remove('show');
}

// ── 학습 흐름 ─────────────────────────────────────────────
async function startLearn() {
  currentStage = 0;
  showLearnStage(0);
  setDots(0);

  const data = await api('/api/learn/start');
  if (data.error) { showToast(data.error); return; }
  currentWord = data.word;

  document.getElementById('intro-word').textContent = data.word;
  document.getElementById('intro-meaning').textContent = data.meaning;

  let status = '';
  let emoji = '🌰';
  if (data.is_wilted) {
    status = '🥀 시든 단어예요 - 다시 외워봐요!';
    emoji = '🥀';
  } else if (data.is_new) {
    status = '✨ 새 씨앗을 심어요!';
    emoji = '🌰';
  } else {
    const stage = data.stage >= 0 ? data.stage : 0;
    emoji = STAGE_EMOJIS[stage];
    status = `${STAGE_NAMES[stage]} 단계 - 계속 성장 중!`;
  }
  document.getElementById('intro-plant').textContent = emoji;
  document.getElementById('intro-status').textContent = status;
}

function showLearnStage(n) {
  document.querySelectorAll('.learn-stage').forEach(el => el.style.display = 'none');
  document.getElementById('stage-' + n).style.display = 'block';
}

async function goStage(n) {
  currentStage = n;
  setDots(n);
  showLearnStage(n);

  if (n === 1) await loadFlashcard();
  if (n === 2) await loadFill();
  if (n === 3) await loadWrite();
}

// Stage 1: 플래시카드 퀴즈
async function loadFlashcard() {
  const data = await api('/api/learn/flashcard');
  document.getElementById('fc-question').textContent = data.question;
  document.getElementById('fc-feedback').style.display = 'none';
  document.getElementById('fc-next').style.display = 'none';

  const container = document.getElementById('fc-options');
  container.innerHTML = data.options.map(o =>
    `<button class="option-btn" onclick="selectOption(this,'${o.word}')">${o.word}</button>`
  ).join('');
}

async function selectOption(btn, selected) {
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  const result = await api('/api/answer', 'POST', { stage_type: 'flashcard', answer: selected });

  if (result.correct) {
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    buttons.forEach(b => { if (b.textContent === result.correct_answer) b.classList.add('correct'); });
  }

  showFeedback('fc-feedback', result);
  document.getElementById('fc-next').style.display = 'block';
  if (result.user) { currentUser = result.user; updateTopBar(); }
}

// Stage 2: 빈칸 채우기
async function loadFill() {
  const data = await api('/api/learn/fill');
  if (data.error) { showToast('문장 데이터가 없어요! 다음으로 넘어갈게요.'); goStage(3); return; }
  document.getElementById('fill-sentence').textContent = data.sentence;
  document.getElementById('fill-translation').textContent = data.translation;
  document.getElementById('fill-answer').value = '';
  document.getElementById('fill-feedback').style.display = 'none';
  document.getElementById('fill-next').style.display = 'none';
  document.getElementById('fill-answer').focus();
}

async function submitFill() {
  const answer = document.getElementById('fill-answer').value.trim();
  if (!answer) { showToast('답을 입력해줘!'); return; }
  const result = await api('/api/answer', 'POST', { stage_type: 'fill', answer });
  showFeedback('fill-feedback', result);
  document.getElementById('fill-next').style.display = 'block';
  if (result.user) { currentUser = result.user; updateTopBar(); }
}

// Stage 3: 문장 만들기
async function loadWrite() {
  const data = await api('/api/learn/write');
  document.getElementById('write-word').textContent = data.word;
  document.getElementById('write-meaning').textContent = data.meaning;
  document.getElementById('write-answer').value = '';
  document.getElementById('write-feedback').style.display = 'none';
  document.getElementById('write-next').style.display = 'none';
}

async function submitWrite() {
  const answer = document.getElementById('write-answer').value.trim();
  if (!answer) { showToast('문장을 써봐!'); return; }
  const result = await api('/api/answer', 'POST', { stage_type: 'write', answer });
  showFeedback('write-feedback', result);
  document.getElementById('write-next').style.display = 'block';
  if (result.user) { currentUser = result.user; updateTopBar(); }
  if (result.leveled_up) loadGarden();
}

function showFeedback(id, result) {
  const box = document.getElementById(id);
  box.style.display = 'block';
  box.className = 'feedback-box ' + (result.correct ? 'correct' : 'wrong');
  box.textContent = result.message;
}

// ── 복습 탭 ───────────────────────────────────────────────
async function loadReview() {
  const words = await api('/api/review');
  reviewWords = words;
  reviewIndex = 0;

  const listEl = document.getElementById('wilted-list');
  const fcArea = document.getElementById('review-flashcard-area');

  if (!words.length) {
    fcArea.style.display = 'none';
    listEl.innerHTML = '<div class="loading">🌿 시든 단어가 없어요!<br>정원이 건강해요!</div>';
    return;
  }

  fcArea.style.display = 'block';
  updateFlashcard();

  listEl.innerHTML = words.map(w =>
    `<div class="wilted-item">
      <div class="wilted-emoji">🥀</div>
      <div>
        <div class="wilted-word">${w.word}</div>
        <div class="wilted-meaning">${w.meaning}</div>
      </div>
    </div>`
  ).join('');
}

function updateFlashcard() {
  const w = reviewWords[reviewIndex];
  if (!w) return;
  document.getElementById('rc-word').textContent = w.word;
  document.getElementById('rc-meaning').textContent = w.meaning;
  document.getElementById('review-counter').textContent = `${reviewIndex+1} / ${reviewWords.length}`;
  const card = document.getElementById('review-card');
  card.classList.remove('flipped');
  cardFlipped = false;
}

function flipCard() {
  const card = document.getElementById('review-card');
  cardFlipped = !cardFlipped;
  card.classList.toggle('flipped', cardFlipped);
}

function nextCard() {
  if (reviewIndex < reviewWords.length - 1) { reviewIndex++; updateFlashcard(); }
}

function prevCard() {
  if (reviewIndex > 0) { reviewIndex--; updateFlashcard(); }
}

// ── 랭킹 ─────────────────────────────────────────────────
async function loadRanking() {
  const data = await api('/api/ranking');
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('ranking-list').innerHTML = data.map((u,i) =>
    `<div class="ranking-item">
      <div class="rank-num">${medals[i] || (i+1)+'.'}</div>
      <div>
        <div class="rank-name">${u.nickname}</div>
        <div style="font-size:11px;color:#888;">🍎 열매 ${u.plants_grown}개</div>
      </div>
      <div class="rank-score">⭐${u.score}</div>
    </div>`
  ).join('') || '<div class="loading">아직 플레이어가 없어요!</div>';
}

// ── Enter 키 지원 ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('login-screen').style.display !== 'none') login();
  }
});
</script>
