
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;
  background:#7bc47f;
  min-height:100vh;
  overflow-x:hidden;
}

/* 하늘+땅 배경 */
.world{
  min-height:100vh;
  background:
    linear-gradient(180deg, #b8e8f5 0%, #d4f0fa 35%, #c8ebb0 55%, #7bc47f 65%, #5aab5e 100%);
  position:relative;
}

/* 땅 물결 */
.world::before{
  content:'';
  position:absolute;
  top:52%;
  left:-5%;
  width:110%;
  height:80px;
  background:#a8d97c;
  border-radius:50% 50% 0 0 / 80px 80px 0 0;
  z-index:0;
}

.screen{display:none;min-height:100vh;position:relative;z-index:1;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* ── 시작 화면 ── */
#startScreen{padding:32px 20px;}

.acnh-board{
  background:#f5e6c8;
  border:4px solid #c8a96e;
  border-radius:20px;
  padding:28px 36px 24px;
  text-align:center;
  box-shadow:0 6px 0 #a07840, 0 8px 24px rgba(0,0,0,0.18);
  max-width:360px;
  width:100%;
  margin-bottom:24px;
}

.acnh-icon{font-size:64px;display:block;margin-bottom:8px;animation:leafSway 3s ease-in-out infinite;}
@keyframes leafSway{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}

.acnh-title{
  font-family:'Press Start 2P',monospace;
  font-size:20px;
  color:#4a7c3f;
  text-shadow:2px 2px 0 #b8dba0;
  line-height:1.6;
  letter-spacing:1px;
  margin-bottom:6px;
}
.acnh-sub{
  font-size:14px;
  font-weight:700;
  color:#7a5c2e;
  margin-bottom:0;
}

.start-btn{
  display:block;
  width:100%;
  max-width:240px;
  margin:0 auto 12px;
  padding:14px 0;
  background:#5aab5e;
  color:#fff;
  border:3px solid #3d8040;
  border-radius:50px;
  font-family:'Press Start 2P',monospace;
  font-size:11px;
  cursor:pointer;
  box-shadow:0 4px 0 #2c6030;
  transition:all .12s;
  letter-spacing:1px;
}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 #2c6030;}
.start-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #2c6030;}

.garden-link-btn{
  display:block;
  width:100%;
  max-width:240px;
  margin:0 auto;
  padding:11px 0;
  background:#f5e6c8;
  color:#7a5c2e;
  border:3px solid #c8a96e;
  border-radius:50px;
  font-family:'Nunito',sans-serif;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 3px 0 #a07840;
  transition:all .12s;
}
.garden-link-btn:hover{transform:translateY(-2px);}
.garden-link-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #a07840;}

.stat-row{
  display:flex;
  gap:10px;
  margin-top:16px;
  flex-wrap:wrap;
  justify-content:center;
  max-width:360px;
}
.stat-chip{
  background:rgba(255,255,255,0.75);
  border:2px solid #c8dba8;
  border-radius:50px;
  padding:6px 14px;
  font-size:12px;
  font-weight:800;
  color:#4a6630;
}

/* 나뭇잎 장식 */
.leaf-deco{
  position:absolute;
  font-size:28px;
  opacity:.7;
  pointer-events:none;
  animation:leafFloat 4s ease-in-out infinite;
}
@keyframes leafFloat{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-10px) rotate(12deg);}}

/* ── 공통 상단바 ── */
.top-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
  max-width:520px;
  margin-bottom:14px;
  background:#f5e6c8;
  border:3px solid #c8a96e;
  border-radius:16px;
  padding:10px 16px;
  box-shadow:0 3px 0 #a07840;
}
.tb-btn{
  background:none;border:none;cursor:pointer;
  font-size:20px;line-height:1;
}
.progress-wrap{flex:1;margin:0 12px;}
.prog-bg{background:#e0cfa0;border-radius:8px;height:10px;overflow:hidden;border:1.5px solid #c8a96e;}
.prog-fill{height:100%;background:#5aab5e;border-radius:8px;transition:width .4s;}
.prog-label{font-size:11px;font-weight:800;color:#7a5c2e;margin-top:3px;}
.score-chip{
  background:#5aab5e;color:#fff;
  border:2px solid #3d8040;border-radius:50px;
  padding:5px 12px;font-size:13px;font-weight:800;
  box-shadow:0 2px 0 #2c6030;
}

/* ── 단어카드 ── */
.word-card{
  background:#fffdf5;
  border:3px solid #c8a96e;
  border-radius:20px;
  padding:28px 28px 22px;
  text-align:center;
  box-shadow:0 4px 0 #a07840, 0 6px 16px rgba(0,0,0,0.1);
  width:100%;
  max-width:420px;
  margin-bottom:14px;
}
.mode-tag{
  display:inline-block;
  padding:3px 12px;
  border-radius:50px;
  font-size:10px;
  font-weight:800;
  letter-spacing:1px;
  margin-bottom:14px;
  text-transform:uppercase;
}
.tag-flash{background:#d4f0c8;color:#3d6e2a;border:2px solid #8cc87a;}
.tag-fill {background:#fde8b8;color:#7a4a10;border:2px solid #e0a040;}
.tag-eng  {background:#ddeeff;color:#2a4e7a;border:2px solid #6aa0d0;}

.word-main{
  font-family:'Press Start 2P',monospace;
  font-size:28px;
  color:#3a2a10;
  margin-bottom:6px;
  letter-spacing:1px;
  line-height:1.4;
}
.word-meaning{font-size:20px;font-weight:800;color:#7a5c2e;margin-bottom:10px;}
.sentence-box{
  background:#f0ead8;
  border:2px solid #d4c090;
  border-radius:12px;
  padding:12px 14px;
  font-size:14px;
  font-weight:700;
  color:#3a2a10;
  line-height:1.9;
  margin-top:10px;
  text-align:left;
}
.sentence-ko{font-size:12px;color:#7a6040;font-weight:700;margin-top:4px;}

/* ── 입력/버튼 ── */
.input-row{display:flex;gap:10px;width:100%;max-width:420px;margin-bottom:10px;}
.ans-input{
  flex:1;padding:12px 16px;
  border:3px solid #c8a96e;border-radius:14px;
  font-family:'Nunito',sans-serif;font-size:17px;font-weight:700;
  background:#fffdf5;color:#3a2a10;outline:none;
  transition:border-color .2s;
}
.ans-input:focus{border-color:#5aab5e;box-shadow:0 0 0 3px rgba(90,171,94,.18);}
.ans-input.ok {border-color:#5aab5e;background:#eafae8;}
.ans-input.no {border-color:#d95a3a;background:#fdf0ed;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}

.go-btn{
  padding:12px 18px;
  background:#5aab5e;color:#fff;
  border:3px solid #3d8040;border-radius:14px;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;
  cursor:pointer;box-shadow:0 3px 0 #2c6030;transition:all .12s;
  white-space:nowrap;
}
.go-btn:hover{transform:translateY(-2px);}
.go-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #2c6030;}

.hint-row{display:flex;gap:10px;width:100%;max-width:420px;margin-bottom:12px;}
.smol-btn{
  flex:1;padding:9px;
  border:2px solid #c8a96e;border-radius:12px;
  background:#f5e6c8;color:#7a5c2e;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;
  cursor:pointer;transition:all .12s;
}
.smol-btn:hover{background:#eedcaa;border-color:#a07840;}

.feedback{
  font-size:14px;font-weight:800;
  padding:8px 20px;border-radius:50px;
  margin-bottom:8px;text-align:center;
  animation:popIn .25s;
}
@keyframes popIn{0%{transform:scale(.8);opacity:0;}100%{transform:scale(1);opacity:1;}}
.fb-ok{background:#d4f0c8;color:#2c6030;border:2px solid #8cc87a;}
.fb-no{background:#fde0d8;color:#8c2a10;border:2px solid #e08878;}
.fb-hint{background:#fde8b8;color:#7a4a10;border:2px solid #e0a040;}
.fb-hide{visibility:hidden;}

/* ── 정원 화면 ── */
#gardenScreen{padding:20px;justify-content:flex-start;align-items:center;}

.garden-hdr{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;max-width:640px;
  margin-bottom:16px;flex-wrap:wrap;gap:10px;
}
.garden-ttl{
  font-family:'Press Start 2P',monospace;font-size:13px;
  color:#2c6030;text-shadow:1px 1px 0 #b8dba0;
}
.hdr-btns{display:flex;gap:10px;}
.acnh-btn{
  padding:9px 16px;
  border:3px solid #3d8040;border-radius:50px;
  background:#5aab5e;color:#fff;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;
  cursor:pointer;box-shadow:0 3px 0 #2c6030;transition:all .12s;
}
.acnh-btn.rev{background:#e07840;border-color:#a05020;box-shadow:0 3px 0 #7a3a10;}
.acnh-btn:hover{transform:translateY(-2px);}
.acnh-btn:active{transform:translateY(2px);}

/* 정원 씬 */
.garden-scene{
  width:100%;max-width:640px;
  background:linear-gradient(180deg,#b8e8f5 0%,#d4f0fa 30%,#c8ebb0 52%,#7bc47f 65%,#5aab5e 100%);
  border:4px solid #4a8a4e;
  border-radius:24px;
  padding:20px 20px 30px;
  position:relative;
  overflow:hidden;
  min-height:360px;
  box-shadow:0 6px 0 #3a6a3e, 0 8px 20px rgba(0,0,0,.15);
}

.scene-sun{
  position:absolute;top:14px;right:24px;
  width:52px;height:52px;
  background:#ffe866;border-radius:50%;
  border:3px solid #e8c820;
  box-shadow:0 0 0 6px rgba(255,232,102,.3);
  animation:sunPulse 4s ease-in-out infinite;
}
@keyframes sunPulse{0%,100%{box-shadow:0 0 0 6px rgba(255,232,102,.3);}50%{box-shadow:0 0 0 12px rgba(255,232,102,.15);}}

.scene-cloud{
  position:absolute;
  background:#fff;border-radius:30px;
  animation:cloudDrift ease-in-out infinite;
}
.scene-cloud::before{
  content:'';position:absolute;
  background:#fff;border-radius:50%;
}
.sc1{top:18px;left:28px;width:72px;height:24px;animation:cloudDrift 7s ease-in-out infinite;}
.sc1::before{top:-12px;left:16px;width:38px;height:28px;}
.sc2{top:10px;left:150px;width:48px;height:18px;opacity:.75;animation:cloudDrift 10s ease-in-out infinite reverse;}
.sc2::before{top:-9px;left:10px;width:28px;height:22px;}
@keyframes cloudDrift{0%,100%{transform:translateX(0);}50%{transform:translateX(14px);}}

/* 풀밭 줄무늬 */
.scene-grass{
  position:absolute;bottom:0;left:0;right:0;height:70px;
  background:#5aab5e;border-radius:0 0 18px 18px;
}
.scene-grass::before{
  content:'';position:absolute;
  top:-12px;left:0;right:0;height:24px;
  background:#6ab86e;
  border-radius:50% 50% 0 0 / 24px 24px 0 0;
}

/* 화단 그리드 */
.plots{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:8px;
  position:relative;z-index:2;
  padding-bottom:44px;
}

.plot{
  aspect-ratio:1;
  border-radius:12px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;
  transition:transform .15s;
  position:relative;
  background:rgba(139,94,60,.25);
  border:2px solid rgba(100,60,20,.3);
  min-height:48px;
}
.plot:hover{transform:scale(1.1) translateY(-4px);z-index:5;}
.plot.empty{opacity:.4;cursor:default;}
.plot.empty:hover{transform:none;}

.plot-icon{font-size:24px;line-height:1;}
.plot-word{
  font-size:6.5px;font-weight:900;
  color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.6);
  text-align:center;margin-top:1px;
  max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  padding:0 2px;
}

/* 성장 단계 배경 */
.plot.s1{background:rgba(210,180,110,.55);border-color:#b89040;}
.plot.s2{background:rgba(160,220,140,.55);border-color:#5aab5e;}
.plot.s3{background:rgba(255,200,120,.55);border-color:#e07840;}
.plot.s4{background:rgba(180,230,200,.55);border-color:#3aaa80;}

/* 툴팁 */
.ptip{
  display:none;position:absolute;
  bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);
  background:#3a2a10;color:#f5e6c8;
  padding:6px 10px;border-radius:9px;
  font-size:11px;font-weight:700;
  white-space:nowrap;z-index:20;
  border:2px solid #7a5c2e;
  pointer-events:none;
}
.ptip::after{
  content:'';position:absolute;top:100%;left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:#3a2a10;
}
.plot:hover .ptip{display:block;}

/* 정원 통계 */
.gstats{
  display:flex;gap:10px;
  width:100%;max-width:640px;
  margin-top:14px;flex-wrap:wrap;
}
.gstat{
  flex:1;min-width:100px;
  background:#fffdf5;
  border:3px solid #c8a96e;border-radius:16px;
  padding:12px 14px;text-align:center;
  box-shadow:0 3px 0 #a07840;
}
.gstat-n{font-size:26px;font-weight:900;color:#3a2a10;}
.gstat-l{font-size:10px;font-weight:800;color:#7a5c2e;text-transform:uppercase;letter-spacing:.8px;}

/* ── 복습 화면 ── */
#reviewScreen{padding:20px;justify-content:flex-start;align-items:center;}

.rev-hdr{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;max-width:420px;margin-bottom:14px;
}
.rev-ttl{font-family:'Press Start 2P',monospace;font-size:11px;color:#3a2a10;}
.streak-chip{
  background:#e07840;color:#fff;
  border:2px solid #a05020;border-radius:50px;
  padding:5px 12px;font-size:12px;font-weight:800;
  box-shadow:0 2px 0 #7a3a10;
}

.bonus-bar-wrap{
  width:100%;max-width:420px;
  background:#fffdf5;border:3px solid #c8a96e;border-radius:16px;
  padding:12px 16px;margin-bottom:14px;
  box-shadow:0 3px 0 #a07840;
}
.bonus-lbl{display:flex;justify-content:space-between;font-size:11px;font-weight:800;color:#7a5c2e;margin-bottom:6px;}
.bonus-track{background:#e0cfa0;border-radius:6px;height:11px;overflow:hidden;border:1.5px solid #c8a96e;}
.bonus-fill{height:100%;background:#e07840;border-radius:6px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}

.rev-card{
  width:100%;max-width:420px;
  background:#fffdf5;border:3px solid #c8a96e;border-radius:20px;
  padding:26px 24px;text-align:center;
  box-shadow:0 4px 0 #a07840, 0 6px 16px rgba(0,0,0,.1);
  margin-bottom:14px;
}
.rev-type{font-size:11px;font-weight:800;color:#7a5c2e;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;}
.rev-q{font-family:'Press Start 2P',monospace;font-size:22px;color:#3a2a10;margin-bottom:6px;line-height:1.5;}
.rev-q-ko{font-size:17px;font-weight:800;color:#7a5c2e;margin-bottom:20px;}
.rev-sent{background:#f0ead8;border:2px solid #d4c090;border-radius:11px;padding:11px 13px;font-size:13px;font-weight:700;color:#3a2a10;line-height:1.9;text-align:left;}
.rev-sent-ko{font-size:11px;color:#7a6040;font-weight:700;margin-top:4px;}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:16px;}
.choice{
  padding:13px 10px;
  border:2.5px solid #c8a96e;border-radius:13px;
  background:#fffdf5;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;color:#3a2a10;transition:all .12s;
}
.choice:hover:not(:disabled){border-color:#5aab5e;background:#eafae8;color:#2c6030;transform:scale(1.03);}
.choice.ok{border-color:#5aab5e!important;background:#d4f0c8!important;color:#2c6030!important;}
.choice.no{border-color:#d95a3a!important;background:#fde0d8!important;color:#8c2a10!important;}
.choice:disabled{cursor:default;}

.rev-inp-row{display:flex;gap:10px;margin-top:16px;}
.rev-inp{
  flex:1;padding:12px 16px;
  border:3px solid #c8a96e;border-radius:13px;
  font-family:'Nunito',sans-serif;font-size:17px;font-weight:700;
  background:#fffdf5;color:#3a2a10;outline:none;
}
.rev-inp:focus{border-color:#5aab5e;box-shadow:0 0 0 3px rgba(90,171,94,.18);}
.rev-sub{
  padding:12px 16px;
  background:#5aab5e;color:#fff;
  border:3px solid #3d8040;border-radius:13px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  cursor:pointer;box-shadow:0 3px 0 #2c6030;
}

.back-btn{
  padding:10px 22px;
  background:#f5e6c8;color:#7a5c2e;
  border:2.5px solid #c8a96e;border-radius:50px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  cursor:pointer;box-shadow:0 2px 0 #a07840;
  transition:all .12s;margin-top:6px;
}
.back-btn:hover{transform:translateY(-2px);}

/* ── 보너스 팝업 (in-flow) ── */
.bonus-overlay-inflow{
  display:none;
  position:relative;z-index:50;
  width:100%;max-width:420px;
  background:rgba(0,0,0,.45);
  border-radius:24px;
  min-height:340px;
  align-items:center;justify-content:center;
  margin-bottom:14px;
}
.bonus-overlay-inflow.show{display:flex;}
.bonus-popup{
  background:#fffdf5;border:4px solid #c8a96e;border-radius:22px;
  padding:32px 40px;text-align:center;
  box-shadow:0 6px 0 #a07840;
  max-width:300px;width:90%;
}
.bp-icon{font-size:56px;display:block;margin-bottom:10px;}
.bp-ttl{font-family:'Press Start 2P',monospace;font-size:14px;color:#4a7c3f;margin-bottom:8px;}
.bp-desc{font-size:13px;font-weight:700;color:#7a5c2e;line-height:1.7;margin-bottom:6px;}
.bp-pts{font-size:30px;font-weight:900;color:#e07840;margin-bottom:16px;}
.bp-close{
  padding:11px 28px;
  background:#5aab5e;color:#fff;
  border:3px solid #3d8040;border-radius:50px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  cursor:pointer;box-shadow:0 3px 0 #2c6030;
}

/* 꽃 날리기 */
.confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:100;}
.cpiece{
  position:absolute;top:-20px;
  font-size:18px;
  animation:cfall linear forwards;
}
@keyframes cfall{
  0%{transform:translateY(0) rotate(0deg);opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}
</style>

<div class="world">

<!-- ── 시작화면 ── -->
<div class="screen active" id="startScreen">
  <span class="leaf-deco" style="top:8%;left:5%;animation-delay:0s;">🍃</span>
  <span class="leaf-deco" style="top:15%;right:6%;animation-delay:1.2s;">🌿</span>
  <span class="leaf-deco" style="bottom:18%;left:8%;animation-delay:.6s;font-size:22px;">🍂</span>
  <span class="leaf-deco" style="bottom:12%;right:10%;animation-delay:2s;font-size:20px;">🌱</span>

  <div class="acnh-board">
    <span class="acnh-icon">🌳</span>
    <div class="acnh-title">PIXEL<br>GARDEN</div>
    <div class="acnh-sub">단어를 심고 마을을 키워봐!</div>
  </div>

  <button class="start-btn" onclick="startGame()">▶ 학습 시작</button>
  <button class="garden-link-btn" onclick="goGarden()">🏡 내 정원 보기</button>

  <div class="stat-row">
    <div class="stat-chip">🌱 <span id="stPlanted">0</span>개 심음</div>
    <div class="stat-chip">⭐ <span id="stScore">0</span>점</div>
    <div class="stat-chip">🔥 최고 <span id="stStreak">0</span>연속</div>
  </div>
</div>

<!-- ── 학습화면 ── -->
<div class="screen" id="studyScreen">
  <div class="top-bar">
    <button class="tb-btn" onclick="goGarden()">🏠</button>
    <div class="progress-wrap">

const PLANTS={1:['🌱','🌿'],2:['🌸','🌼','🌺'],3:['🌻','🌳','🎋'],4:['🌲','🎄','🍀']};
const BONUSES={5:{icon:'🍀',desc:'5연속 정답!',pts:30},10:{icon:'🎁',desc:'10연속 정답!',pts:70},20:{icon:'⭐',desc:'20연속 전설!',pts:200}};

let state={score:0,bestStreak:0,totalStreak:0,garden:{},reviewCount:0,reviewStreak:0,bonusProgress:0};
let sess={words:[],idx:0,mode:'flash',hintUsed:false,cur:null};
let rev={words:[],idx:0,cur:null,answered:false,qType:'mc'};

function load(){try{const d=localStorage.getItem('pg3');if(d)state=JSON.parse(d);}catch(e){}}
function save(){localStorage.setItem('pg3',JSON.stringify(state));}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='startScreen')updateStart();
  if(id==='gardenScreen')renderGarden();
}
function goGarden(){showScreen('gardenScreen');}

function updateStart(){
  document.getElementById('stPlanted').textContent=Object.keys(state.garden).length;
  document.getElementById('stScore').textContent=state.score;
  document.getElementById('stStreak').textContent=state.bestStreak;
}

function startGame(){
  sess.words=[...WORDS].sort(()=>Math.random()-.5);
  sess.idx=0;
  document.getElementById('curScore').textContent=state.score;
  showScreen('studyScreen');
  showWord();
}

function showWord(){
  if(sess.idx>=sess.words.length){goGarden();return;}
  const w=sess.words[sess.idx];
  sess.cur=w;sess.hintUsed=false;
  const total=sess.words.length;
  const pct=Math.round((sess.idx/total)*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLabel').textContent=`${sess.idx} / ${total}`;

  const inGarden=!!state.garden[w.w];
  sess.mode=!inGarden?'flash':state.garden[w.w].stage>=2?'eng':'fill';

  const tag=document.getElementById('modeTag');
  const wMain=document.getElementById('wMain');
  const wMean=document.getElementById('wMean');
  const sentBox=document.getElementById('sentBox');
  const inputRow=document.getElementById('inputRow');
  const inp=document.getElementById('ansInput');
  const fb=document.getElementById('feedback');
  const hBtn=document.getElementById('hintBtn');

  fb.className='feedback fb-hide';
  inp.value='';inp.className='ans-input';

  if(sess.mode==='flash'){
    tag.textContent='플래시카드';tag.className='mode-tag tag-flash';
    wMain.textContent=w.w;wMean.textContent=w.m;wMean.style.display='block';
    const sd=S[w.w];
    if(sd){
      sentBox.innerHTML=sd.s.replace('___',`<strong style="color:#4a7c3f;">${w.w}</strong>`)+`<div class="sentence-ko">${sd.t}</div>`;
      sentBox.style.display='block';
    } else sentBox.style.display='none';
    inputRow.style.display='none';hBtn.style.display='none';
  } else if(sess.mode==='fill'){
    tag.textContent='빈칸 채우기';tag.className='mode-tag tag-fill';
    wMain.textContent=w.m;wMean.style.display='none';
    const sd=S[w.w];
    if(sd){
      sentBox.innerHTML=sd.s.replace('___','<span style="background:#c8a96e;color:#fff;padding:0 8px;border-radius:5px;font-weight:800;">___</span>')+`<div class="sentence-ko">${sd.t}</div>`;
      sentBox.style.display='block';
    } else sentBox.style.display='none';
    inputRow.style.display='flex';hBtn.style.display='block';
  } else {
    tag.textContent='영단어 쓰기';tag.className='mode-tag tag-eng';
    wMain.textContent=w.m;wMean.style.display='none';sentBox.style.display='none';
    inputRow.style.display='flex';hBtn.style.display='block';
  }
}

function showHint(){
  sess.hintUsed=true;
  const w=sess.cur.w;
  const hint=w[0]+w.slice(1).split('').map((c,i)=>i<2?c:'_').join('');
  const fb=document.getElementById('feedback');
  fb.textContent='힌트: '+hint;fb.className='feedback fb-hint';
}

function checkAnswer(){
  const w=sess.cur;
  const val=document.getElementById('ansInput').value.trim().toLowerCase();
  const inp=document.getElementById('ansInput');
  const fb=document.getElementById('feedback');
  if(!val)return;
  if(val===w.w){
    inp.className='ans-input ok';
    fb.textContent=sess.hintUsed?'정답! (힌트 사용)':'정답! 🌿';
    fb.className='feedback fb-ok';
    state.score+=sess.hintUsed?5:10;
    state.totalStreak++;
    if(state.totalStreak>state.bestStreak)state.bestStreak=state.totalStreak;
    document.getElementById('curScore').textContent=state.score;
    plantWord(w.w);save();
    setTimeout(nextWord,700);
  } else {
    inp.className='ans-input no';
    fb.textContent='틀렸어요! 정답: '+w.w;
    fb.className='feedback fb-no';
    state.totalStreak=0;save();
    setTimeout(nextWord,1200);
  }
}

function plantWord(word){
  if(!state.garden[word]){
    const p=PLANTS[1];
    state.garden[word]={stage:1,plant:p[Math.floor(Math.random()*p.length)],reviewCount:0};
  }
}
function upgradeWord(word){
  if(!state.garden[word])return;
  const g=state.garden[word];
  if(g.stage<4){g.stage++;const p=PLANTS[g.stage];g.plant=p[Math.floor(Math.random()*p.length)];}
  g.reviewCount++;
}

function nextWord(){
  if(sess.mode==='flash'){plantWord(sess.cur.w);state.score+=5;save();}
  sess.idx++;showWord();
}

function renderGarden(){
  const grid=document.getElementById('plots');
  grid.innerHTML='';
  const planted=Object.entries(state.garden);
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='plot';
    if(i<planted.length){
      const[word,data]=planted[i];
      el.classList.add('s'+data.stage);
      const wData=WORDS.find(x=>x.w===word);
      el.innerHTML=`<div class="plot-icon">${data.plant}</div><div class="plot-word">${word}</div><div class="ptip">${word} · ${wData?wData.m:''}<br>성장 ${'★'.repeat(data.stage)} · 복습 ${data.reviewCount}회</div>`;
    } else {
      el.classList.add('empty');
      el.innerHTML='<div style="font-size:16px;">·</div>';
    }
    grid.appendChild(el);
  }
  document.getElementById('gs1').textContent=planted.length;
  document.getElementById('gs2').textContent=state.reviewCount;
  document.getElementById('gs3').textContent=state.score;
  document.getElementById('gs4').textContent=state.bestStreak;
}

function startReview(){
  const planted=Object.keys(state.garden);
  if(!planted.length){alert('먼저 단어를 심어봐요! 🌱');return;}
  rev.words=[...planted].sort(()=>Math.random()-.5);
  rev.idx=0;state.reviewStreak=0;
  document.getElementById('revStreak').textContent=0;
  updateBonusBar();showScreen('reviewScreen');showRevQ();
}

function showRevQ(){
  if(rev.idx>=rev.words.length){rev.words=[...Object.keys(state.garden)].sort(()=>Math.random()-.5);rev.idx=0;}
  const word=rev.words[rev.idx];rev.cur=word;rev.answered=false;
  const wData=WORDS.find(x=>x.w===word);
  const sd=S[word];
  const planted=Object.keys(state.garden);
  rev.qType=Math.random()>.5&&planted.length>=4?'mc':'type';
  const rType=Math.floor(Math.random()*3);

  const lbl=document.getElementById('revTypeLbl');
  const rQ=document.getElementById('revQ');
  const rKo=document.getElementById('revQKo');
  const rSent=document.getElementById('revSent');
  const rSentKo=document.getElementById('revSentKo');
  const rChoices=document.getElementById('revChoices');
  const rRow=document.getElementById('revInpRow');
  const rInp=document.getElementById('revInp');

  rInp.value='';rInp.className='rev-inp';
  rQ.style.display=rKo.style.display=rSent.style.display=rSentKo.style.display='none';
  rChoices.style.display=rRow.style.display='none';

  if(rType===0){
    lbl.textContent='🇰🇷 뜻 보고 영단어 맞추기';
    rQ.textContent=wData?wData.m:'';rQ.style.display='block';
  } else if(rType===1&&sd){
    lbl.textContent='✏️ 빈칸에 들어갈 단어 쓰기';
    rSent.innerHTML=sd.s.replace('___','<span style="background:#c8a96e;color:#fff;padding:0 6px;border-radius:5px;font-weight:800;">___</span>');
    rSentKo.textContent=sd.t;
    rSent.style.display='block';rSentKo.style.display='block';
  } else {
    lbl.textContent='🇬🇧 영어 보고 뜻 확인';
    rQ.textContent=word;rQ.style.display='block';
  }

  if(rev.qType==='mc'){rChoices.style.display='grid';buildChoices(word,wData,rType);}
  else rRow.style.display='flex';
}

function buildChoices(correctWord,wData,rType){
  const box=document.getElementById('revChoices');box.innerHTML='';
  const planted=Object.keys(state.garden);
  const wrongs=planted.filter(x=>x!==correctWord).sort(()=>Math.random()-.5).slice(0,3);
  let options;
  if(rType===2){
    const correct=wData?wData.m:'';
    const wm=wrongs.map(x=>(WORDS.find(y=>y.w===x)||{}).m||'').filter(Boolean);
    options=[correct,...wm].sort(()=>Math.random()-.5);
    options.forEach(opt=>{
      const btn=document.createElement('button');
      btn.className='choice';btn.textContent=opt;
      btn.onclick=()=>{if(rev.answered)return;rev.answered=true;const ok=opt===correct;btn.classList.add(ok?'ok':'no');if(!ok)box.querySelectorAll('.choice').forEach(b=>{if(b.textContent===correct)b.classList.add('ok');});handleRevResult(ok);};
      box.appendChild(btn);
    });
  } else {
    options=[correctWord,...wrongs].sort(()=>Math.random()-.5);
    options.forEach(opt=>{
      const btn=document.createElement('button');
      btn.className='choice';btn.textContent=opt;
      btn.onclick=()=>{if(rev.answered)return;rev.answered=true;const ok=opt===correctWord;btn.classList.add(ok?'ok':'no');if(!ok)box.querySelectorAll('.choice').forEach(b=>{if(b.textContent===correctWord)b.classList.add('ok');});handleRevResult(ok);};
      box.appendChild(btn);
    });
  }
}

function checkReview(){
  if(rev.answered)return;
  const val=document.getElementById('revInp').value.trim().toLowerCase();
  if(!val)return;rev.answered=true;
  const wData=WORDS.find(x=>x.w===rev.cur);
  const ok=val===rev.cur||(wData&&val===wData.m);
  document.getElementById('revInp').style.borderColor=ok?'#5aab5e':'#d95a3a';
  document.getElementById('revInp').style.background=ok?'#eafae8':'#fde0d8';
  handleRevResult(ok);
}

function handleRevResult(ok){
  if(ok){
    state.score+=8;state.reviewStreak++;state.reviewCount++;state.totalStreak++;
    if(state.totalStreak>state.bestStreak)state.bestStreak=state.totalStreak;
    state.bonusProgress=(state.bonusProgress||0)+1;
    upgradeWord(rev.cur);spawnConfetti(4,'global');
    document.getElementById('revStreak').textContent=state.reviewStreak;
    updateBonusBar();checkBonus();
  } else {
    state.reviewStreak=0;state.totalStreak=0;
    state.bonusProgress=Math.max(0,(state.bonusProgress||0)-1);
    document.getElementById('revStreak').textContent=0;
    updateBonusBar();
  }
  save();
  if(!ok||!document.getElementById('bonusOvl').classList.contains('show')){
    setTimeout(()=>{rev.idx++;showRevQ();},ok?600:1400);
  }
}

function updateBonusBar(){
  const p=state.bonusProgress||0;
  const pct=Math.min(100,Math.round((p%5)/5*100));
  document.getElementById('bonusFill').style.width=pct+'%';
  document.getElementById('bonusCnt').textContent=(p%5)+' / 5';
}

function checkBonus(){
  const p=state.bonusProgress||0;
  if(p>0&&p%5===0){
    const key=p<=5?5:p<=10?10:20;
    const r=BONUSES[key]||BONUSES[5];
    state.score+=r.pts;
    document.getElementById('bpIcon').textContent=r.icon;
    document.getElementById('bpDesc').textContent=r.desc;
    document.getElementById('bpPts').textContent='+'+r.pts+'점';
    document.getElementById('bonusOvl').classList.add('show');
    spawnConfetti(18,'global');save();
  }
}

function closeBonus(){
  document.getElementById('bonusOvl').classList.remove('show');
  rev.idx++;showRevQ();
}

function spawnConfetti(n,target){
  const wrap=document.getElementById(target==='global'?'globalConfetti':'gardenConfetti');
  const pieces=['🌸','🍀','⭐','🌼','🌿','🎊','🍃'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');
    el.className='cpiece';
    el.textContent=pieces[Math.floor(Math.random()*pieces.length)];
    el.style.left=(10+Math.random()*80)+'%';
    el.style.animationDuration=(1.5+Math.random()*2)+'s';
    el.style.animationDelay=(Math.random()*.4)+'s';
    wrap.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  }
}

document.getElementById('ansInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){if(sess.mode==='flash')nextWord();else checkAnswer();}
});
document.getElementById('revInp').addEventListener('keydown',e=>{
  if(e.key==='Enter')checkReview();
});

load();showScreen('startScreen');
</script>
